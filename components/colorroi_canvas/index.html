<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorROI Canvas</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        font-family: sans-serif;
      }

      .canvas-wrap {
        position: relative;
        display: inline-block;
        max-width: 100%;
        line-height: 0;
        user-select: none;
        touch-action: none;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #baseCanvas {
        position: static;
        display: block;
      }

      #drawCanvas {
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <div id="wrap" class="canvas-wrap">
      <canvas id="baseCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
      <canvas id="roiMaskCanvas" hidden></canvas>
      <canvas id="hairMaskCanvas" hidden></canvas>
    </div>

    <script>
      // 轻量实现 Streamlit component 通信协议，避免为一个画布组件引入 npm 构建链。
      // 注意：新版 Streamlit 前端在会话对象初始化完成前收到组件消息时，
      // 可能弹出 “Tried to use SessionInfo before it was initialized”。
      // 因此组件只保留必要消息：初始化 ready，以及点击 Analyze 后的一次 mask 回传。
      let componentReadySent = false;
      let firstRenderReceived = false;

      const Streamlit = {
        ready() {
          if (componentReadySent) {
            return;
          }
          componentReadySent = true;
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
            "*"
          );
        },
        setComponentValue(value) {
          if (!firstRenderReceived) {
            return;
          }
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setComponentValue", value, dataType: "json" },
            "*"
          );
        },
      };

      const wrap = document.getElementById("wrap");
      const baseCanvas = document.getElementById("baseCanvas");
      const drawCanvas = document.getElementById("drawCanvas");
      const roiMaskCanvas = document.getElementById("roiMaskCanvas");
      const hairMaskCanvas = document.getElementById("hairMaskCanvas");
      const baseCtx = baseCanvas.getContext("2d");
      const drawCtx = drawCanvas.getContext("2d");
      const roiMaskCtx = roiMaskCanvas.getContext("2d");
      const hairMaskCtx = hairMaskCanvas.getContext("2d");

      let args = {};
      let isDrawing = false;
      let lastPoint = null;
      let currentImageSignature = "";
      let pendingEmit = null;
      let renderSeq = 0;
      let lastSyncedToken = 0;

      function resizeCanvas(canvas, width, height) {
        canvas.width = width;
        canvas.height = height;
      }

      function setupSize(width, height) {
        for (const canvas of [baseCanvas, drawCanvas, roiMaskCanvas, hairMaskCanvas]) {
          resizeCanvas(canvas, width, height);
        }
        wrap.style.width = `${width}px`;
        wrap.style.height = `${height}px`;
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src || "";
        });
      }

      async function renderFromArgs(nextArgs) {
        const seq = ++renderSeq;
        args = nextArgs || {};
        const width = Number(args.width || 600);
        const height = Number(args.height || 400);
        const signature = [args.imageDataUrl || "", width, height].join("|");

        // 只在图片或尺寸变化时重建底图；mask 变化时保留当前前端绘制结果，
        // 避免橡皮擦在 Streamlit rerun 中出现整层闪烁。
        if (signature === currentImageSignature) {
          return;
        }
        currentImageSignature = signature;
        setupSize(width, height);
        baseCtx.clearRect(0, 0, width, height);
        drawCtx.clearRect(0, 0, width, height);
        roiMaskCtx.clearRect(0, 0, width, height);
        hairMaskCtx.clearRect(0, 0, width, height);

        try {
          const baseImage = await loadImage(args.imageDataUrl);
          if (seq !== renderSeq) {
            return;
          }
          baseCtx.drawImage(baseImage, 0, 0, width, height);
        } catch (_) {
          if (seq !== renderSeq) {
            return;
          }
          baseCtx.fillStyle = "#f5f5f5";
          baseCtx.fillRect(0, 0, width, height);
        }

        await drawMaskLayer(args.roiMaskDataUrl, roiMaskCtx, "rgba(255,220,0,1)", width, height, seq);
        await drawMaskLayer(args.hairMaskDataUrl, hairMaskCtx, "rgba(230,45,24,1)", width, height, seq);
      }

      async function drawMaskLayer(maskUrl, maskCtx, visibleColor, width, height, seq) {
        if (!maskUrl) {
          return;
        }
        try {
          const maskImage = await loadImage(maskUrl);
          if (seq !== renderSeq) {
            return;
          }
          maskCtx.drawImage(maskImage, 0, 0, width, height);
          drawCtx.save();
          drawCtx.globalCompositeOperation = "source-over";
          drawCtx.fillStyle = visibleColor;
          drawCtx.globalAlpha = 1;
          drawCtx.drawImage(tintMask(maskImage, visibleColor, width, height), 0, 0);
          drawCtx.restore();
        } catch (_) {
          // mask 加载失败时保持空标记层，避免影响原图显示。
        }
      }

      function tintMask(maskImage, color, width, height) {
        const temp = document.createElement("canvas");
        temp.width = width;
        temp.height = height;
        const tempCtx = temp.getContext("2d");
        tempCtx.drawImage(maskImage, 0, 0, width, height);
        tempCtx.globalCompositeOperation = "source-in";
        tempCtx.fillStyle = color;
        tempCtx.fillRect(0, 0, width, height);
        return temp;
      }

      function pointerPoint(event) {
        const rect = drawCanvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * drawCanvas.width,
          y: ((event.clientY - rect.top) / rect.height) * drawCanvas.height,
        };
      }

      function prepareStroke(ctx, mode) {
        ctx.lineWidth = Number(args.brushSize || 10);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.globalAlpha = 1;
        if (mode === "eraser") {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = mode === "hair" ? "rgba(230,45,24,1)" : "rgba(255,220,0,1)";
        }
      }

      function strokeSegment(ctx, fromPoint, toPoint, mode) {
        ctx.save();
        prepareStroke(ctx, mode);
        ctx.beginPath();
        ctx.moveTo(fromPoint.x, fromPoint.y);
        ctx.lineTo(toPoint.x, toPoint.y);
        ctx.stroke();
        ctx.restore();
      }

      function strokeMasks(fromPoint, toPoint, mode) {
        if (mode === "eraser") {
          strokeSegment(roiMaskCtx, fromPoint, toPoint, "eraser");
          strokeSegment(hairMaskCtx, fromPoint, toPoint, "eraser");
          return;
        }
        const targetCtx = mode === "hair" ? hairMaskCtx : roiMaskCtx;
        targetCtx.save();
        targetCtx.lineWidth = Number(args.brushSize || 10);
        targetCtx.lineCap = "round";
        targetCtx.lineJoin = "round";
        targetCtx.globalCompositeOperation = "source-over";
        targetCtx.strokeStyle = "rgba(255,255,255,1)";
        targetCtx.beginPath();
        targetCtx.moveTo(fromPoint.x, fromPoint.y);
        targetCtx.lineTo(toPoint.x, toPoint.y);
        targetCtx.stroke();
        targetCtx.restore();
      }

      function emitMasks(syncToken) {
        if (!firstRenderReceived) {
          return;
        }
        window.clearTimeout(pendingEmit);
        pendingEmit = window.setTimeout(() => {
          Streamlit.setComponentValue({
            roiMaskDataUrl: roiMaskCanvas.toDataURL("image/png"),
            hairMaskDataUrl: hairMaskCanvas.toDataURL("image/png"),
            syncToken,
          });
        }, 30);
      }

      function startDrawing(event) {
        event.preventDefault();
        isDrawing = true;
        lastPoint = pointerPoint(event);
        drawCanvas.setPointerCapture(event.pointerId);
      }

      function continueDrawing(event) {
        if (!isDrawing || !lastPoint) {
          return;
        }
        event.preventDefault();
        const mode = args.mode || "roi";
        const nextPoint = pointerPoint(event);
        strokeSegment(drawCtx, lastPoint, nextPoint, mode);
        strokeMasks(lastPoint, nextPoint, mode);
        lastPoint = nextPoint;
      }

      function finishDrawing(event) {
        if (!isDrawing) {
          return;
        }
        event.preventDefault();
        isDrawing = false;
        lastPoint = null;
      }

      drawCanvas.addEventListener("pointerdown", startDrawing);
      drawCanvas.addEventListener("pointermove", continueDrawing);
      drawCanvas.addEventListener("pointerup", finishDrawing);
      drawCanvas.addEventListener("pointercancel", finishDrawing);
      drawCanvas.addEventListener("pointerleave", finishDrawing);

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type !== "streamlit:render") {
          return;
        }
        firstRenderReceived = true;
        renderFromArgs(data.args || {});
        const syncToken = Number((data.args || {}).syncToken || 0);
        if (syncToken > 0 && syncToken !== lastSyncedToken) {
          lastSyncedToken = syncToken;
          emitMasks(syncToken);
        }
      });

      // 等当前脚本执行完再通知父页面组件已就绪，避免和 Streamlit 会话初始化竞争。
      window.setTimeout(() => Streamlit.ready(), 0);
    </script>
  </body>
</html>
